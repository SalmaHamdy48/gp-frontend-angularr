 <div class="all">
  <!-- Navbar -->
  <nav>
    <div class="nav-container">
      <span class="logo">FitFusion ✨</span>
      <div class="nav-buttons">
        <button class="nav-btn login">Login</button>
        <button class="nav-btn signup">Sign Up</button>
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <main>
    <div class="card">
      <div class="card-header">
        <h1 class="card-title">Welcome Back 💕</h1>
        <p class="card-description">Sign in to your FitFusion account</p>
      </div>

      <form class="login-form" action="#" method="post" > 
        
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="**********" required minlength="6"> 
        </div>
        <button type="submit" class="signin-button" [disabled]="signupForm.invalid">Sign In</button>
      </form>

      <div class="card-footer">
        Don't have an account? <a href="#"> Sign up</a>
      </div>
    </div>
  </main>
</div>
