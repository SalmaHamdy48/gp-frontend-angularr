  <!-- Main Content --> 
  <main class="main-content"> 
    <!-- Page Header -->
    <div class="page-header"> 
      <h1>My Profile</h1> 
      <!-- Tabs -->
      <div class="tabs">
        <button 
          class="tab" 
          [class.active]="activeTab === 'profile'"
          (click)="setActiveTab('profile')">
          Profile Info
        </button>
        <button 
          class="tab" 
          [class.active]="activeTab === 'closet'"
          (click)="setActiveTab('closet')">
          My Closet
        </button>
      </div>
    </div>

    <!-- Profile Info Card -->
    <div *ngIf="activeTab === 'profile'" class="card">
      <div class="card-header">
        <h2>Profile Information</h2>
        <p class="description">Manage your profile picture and details</p>
      </div>
      <div class="card-content"> 
        <!-- Photo Upload -->
         <div class="photo-upload">
          <div class="avatar-placeholder">
            <i class="fas fa-user-circle"></i>
          </div>
          <div class="upload-controls">
            <button class="upload-btn" (click)="onUploadPhoto()">
              <i class="fas fa-upload"></i> Upload Photo
            </button>
            <span class="upload-note">This photo will be used for virtual try-on</span>
          </div>
        </div> 

        <!-- User Info Fields -->
        <div class="info-fields">
          <div class="field-group">
            <label>Name</label>
            <div class="field-value">{{ userName }}</div>
          </div>
          <div class="field-group">
            <label>Email</label>
            <div class="field-value">{{ userEmail }}</div>
          </div>
        </div>
      </div>
    </div> 

    <!-- My Closet Content -->
    <div *ngIf="activeTab === 'closet'" class="card">
      <div class="card-header">
        <h2>My Closet</h2>
        <p class="description">Your saved items will appear here</p>
      </div>
      <div class="card-content">
        <p class="empty-message">No items yet.</p>
      </div>
    </div>
  </main>
</div>
