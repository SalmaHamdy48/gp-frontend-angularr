   <div class="all">
  <!-- Navbar -->
  <nav>
    <div class="nav-container">
      <span class="logo">FitFusion ✨</span>
      <div class="nav-buttons">
        <button class="nav-btn login">Login</button>
        <button class="nav-btn signup">Sign Up</button>
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <main>
    <div class="card">
      <div class="card-header">
        <h1 class="card-title">Create Account ✨</h1>
        <p class="card-description">Sign up to start your style journey with FitFusion</p>
      </div>

      <form class="signup-form" action="#" method="post"    (ngSubmit)="onSubmit()" #signupForm="ngForm"> 
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required  [(ngModel)]="signupData.name" >
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required [(ngModel)]="signupData.email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="**********" required [(ngModel)]="signupData.password"  minlength="6"> 
        </div>
        <button type="submit" class="signup-button" [disabled]="signupForm.invalid">Sign Up</button>
      </form>

      <div class="card-footer">
        Already have an account? <a href="#">Sign in</a>
      </div>
    </div>
  </main>
</div>
